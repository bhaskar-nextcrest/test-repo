<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aptness WebMCP Widget</title>
  <style>
    body { margin: 0; font-family: sans-serif; }
    #webmcp-widget-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
    }
  </style>
</head>
<body>
  <div id="webmcp-widget-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@modelcontextprotocol/web-widget@latest/dist/webmcp-widget.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const widgetContainer = document.getElementById('webmcp-widget-container');
      if (widgetContainer) {
        window.WebMCPWidget.init({
          containerId: 'webmcp-widget-container',
          mcpServerUrl: 'http://localhost:3000/mcp', // Replace with your deployed MCP server URL
          initialMessage: 'Hello! I am your Aptness AI assistant. How can I help you automate today?',
          theme: {
            primaryColor: '#007bff',
            accentColor: '#6c757d',
            buttonBackgroundColor: '#007bff',
            buttonTextColor: '#ffffff',
            chatBubbleUserBackground: '#e0efff',
            chatBubbleBotBackground: '#f0f0f0'
          },
          branding: {
            productName: 'Aptness AI',
            logoUrl: 'https://aptness.ai/favicon.svg' // Replace with a small, accessible logo
          },
          features: {
            speechToText: true,
            textToSpeech: true
          }
        });
      }
    });
  </script>
</body>
</html>
